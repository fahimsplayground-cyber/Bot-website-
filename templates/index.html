<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Role Tree</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <h1>Discord Role Control Panel</h1>
    <div id="tree-container"></div>
    <button id="add-option-btn">Add Option</button>

    <div id="popup" class="popup hidden">
        <h2>Add / Edit Option</h2>
        <form id="node-form">
            <label>Question:</label>
            <input type="text" id="question" required>
            <label>Option:</label>
            <input type="text" id="label" required>
            <label>Role ID / Name (optional):</label>
            <input type="text" id="role_id">
            <input type="hidden" id="node_id">
            <input type="hidden" id="parent_id">
            <button type="submit">Save</button>
            <button type="button" id="cancel-btn">Cancel</button>
        </form>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
